<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Linguagens Formais e Autômatos</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'ifpa-green': '#10b981',
                        'ifpa-dark': '#0f172a',
                        'ifpa-light': '#f8fafc',
                        'ifpa-accent': '#38bdf8'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="flex h-screen overflow-hidden text-slate-800">

    <!-- ==================== NAVEGAÇÃO LATERAL ==================== -->
    <nav class="w-64 bg-slate-100 border-r border-slate-200 flex flex-col shadow-sm z-10 shrink-0">
        <div class="p-6 border-b border-slate-200 bg-white">
            <h1 class="text-xl font-bold text-slate-800 leading-tight">Linguagens Formais <br><span
                    class="text-emerald-600 text-sm font-semibold">& Autômatos</span></h1>
            <p class="text-xs text-slate-500 mt-2">Guia Teórico e Prático</p>
        </div>

        <div class="px-6 py-5 border-b border-slate-200 bg-slate-50 shadow-inner">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Sua Evolução</span>
                <span class="text-xs font-bold text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded-full"
                    id="progress-text">0%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2.5 mb-2 overflow-hidden shadow-inner">
                <div id="progress-bar"
                    class="bg-gradient-to-r from-emerald-400 to-emerald-600 h-2.5 rounded-full transition-all duration-700 ease-out w-0">
                </div>
            </div>
            <div class="text-[10px] text-slate-400 mt-2 cursor-pointer hover:text-slate-700 flex items-center gap-1 select-none font-bold uppercase tracking-wider"
                onclick="toggleProgressDetails()">
                <span>Ver Missões de Estudo</span> <span id="progress-toggle-icon">▾</span>
            </div>
            <div id="progress-details"
                class="hidden mt-3 space-y-1 border-t border-slate-200 pt-3 max-h-48 overflow-y-auto pr-1"></div>
        </div>

        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li><button onclick="navigate('apostila')" id="btn-apostila"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-slate-700 hover:bg-slate-200 transition-colors">📖
                        Apostila Completa</button></li>
                <li class="px-6 text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 mt-2">Teoria e
                    Construção</li>
                <li><button onclick="navigate('intro')" id="btn-intro"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-slate-700 hover:bg-slate-200 transition-colors nav-active">📚
                        Fundamentos</button></li>
                <li><button onclick="navigate('grammars')" id="btn-grammars"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-slate-700 hover:bg-slate-200 transition-colors">🔤
                        Gramáticas</button></li>
                <li><button onclick="navigate('chomsky')" id="btn-chomsky"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-slate-700 hover:bg-slate-200 transition-colors">🏛️
                        Hierarquia Chomsky</button></li>

                <li
                    class="mt-4 pt-2 border-t border-slate-200 px-6 text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">
                    Máquinas de Estados</li>
                <li><button onclick="navigate('afd')" id="btn-afd"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-emerald-700 font-medium hover:bg-slate-200 transition-colors">⚙️
                        Autômato (AFD)</button></li>
                <li><button onclick="navigate('afn')" id="btn-afn"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-indigo-700 font-medium hover:bg-slate-200 transition-colors">🔀
                        Autômato (AFN)</button></li>
                <li><button onclick="navigate('builder')" id="btn-builder"
                        class="nav-btn w-full text-left px-6 py-3 text-sm font-bold text-amber-700 hover:bg-amber-100 transition-colors">🛠️
                        Construtor</button></li>

                <li
                    class="mt-4 pt-2 border-t border-slate-200 px-6 text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">
                    Extra</li>
                <li><button onclick="navigate('regex')" id="btn-regex"
                        class="nav-btn w-full text-left px-6 py-3 text-sm text-rose-700 font-medium hover:bg-rose-100 transition-colors">🔍
                        Expressões Regulares</button></li>
                <li><button onclick="navigate('pumping')" id="btn-pumping"
                        class="nav-btn w-full text-left px-6 py-3 text-sm font-bold text-orange-700 hover:bg-orange-100 transition-colors">🎮
                        Jogo: Bombeamento</button></li>

                <li class="mt-4 border-t border-slate-200 pt-2"><button onclick="navigate('quiz')" id="btn-quiz"
                        class="nav-btn w-full text-left px-6 py-3 text-sm font-bold text-sky-700 hover:bg-sky-100 transition-colors">📝
                        Quiz (Avaliação)</button></li>
            </ul>
        </div>
    </nav>

    <!-- ==================== CONTEÚDO PRINCIPAL ==================== -->
    <main class="flex-1 bg-slate-50 overflow-y-auto relative p-8">

        <div data-include="sections/intro.html"></div>
        <div data-include="sections/apostila.html"></div>
        <div data-include="sections/grammars.html"></div>
        <div data-include="sections/chomsky.html"></div>
        <div data-include="sections/afd.html"></div>
        <div data-include="sections/afn.html"></div>
        <div data-include="sections/builder.html"></div>
        <div data-include="sections/regex.html"></div>
        <div data-include="sections/pumping.html"></div>
        <div data-include="sections/quiz.html"></div>


    </main>

    <!-- ==================== SCRIPTS JS ==================== -->
    <script src="js/progress-nav.js"></script>
    <script src="js/fundamentos.js"></script>
    <script src="js/automata.js"></script>
    <script src="js/builder.js"></script>
    <script src="js/regex.js"></script>
    <script src="js/pumping.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/main.js"></script>


    <script>
        // Carrega cada seção HTML de forma assíncrona
        async function loadSections() {
            const placeholders = document.querySelectorAll('[data-include]');
            for (const el of placeholders) {
                const url = el.getAttribute('data-include');
                try {
                    const resp = await fetch(url);
                    const html = await resp.text();
                    el.outerHTML = html;
                } catch (e) {
                    console.error('Erro ao carregar seção:', url, e);
                }
            }
        }
        loadSections();
    </script>
</body>

</html>
